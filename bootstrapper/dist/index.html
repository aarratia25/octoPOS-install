<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OctoPOS Setup</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        color: #f8fafc;
        overflow: hidden;
      }
      .root {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 32px;
        gap: 18px;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: #10b981;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: -1px;
      }
      .title {
        font-size: 20px;
        font-weight: 600;
      }
      .subtitle {
        font-size: 13px;
        color: #94a3b8;
        text-align: center;
        max-width: 360px;
      }
      form {
        width: 100%;
        max-width: 320px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 4px;
      }
      label {
        font-size: 12px;
        font-weight: 500;
        color: #cbd5e1;
        margin-bottom: 4px;
        display: block;
      }
      input {
        width: 100%;
        padding: 9px 12px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 6px;
        color: #f8fafc;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        transition: border-color 150ms;
      }
      input:focus {
        border-color: #10b981;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #10b981;
        color: #0f172a;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        transition: background 150ms;
      }
      button:hover:not(:disabled) { background: #34d399; }
      button:disabled {
        background: #475569;
        color: #94a3b8;
        cursor: not-allowed;
      }
      .progress-wrap {
        width: 100%;
        max-width: 380px;
      }
      .progress-bar {
        height: 6px;
        background: rgba(148, 163, 184, 0.2);
        border-radius: 999px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #10b981;
        width: 0%;
        transition: width 300ms ease;
        border-radius: 999px;
      }
      .progress-text {
        margin-top: 10px;
        font-size: 12px;
        color: #cbd5e1;
        text-align: center;
        min-height: 16px;
      }
      .error {
        margin-top: 12px;
        padding: 10px 14px;
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.4);
        border-radius: 6px;
        color: #fca5a5;
        font-size: 12px;
        max-width: 320px;
        text-align: center;
        display: none;
      }
      .error.visible { display: block; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="root" id="form-view">
      <div class="logo">O</div>
      <div class="title">Instalar OctoPOS</div>
      <div class="subtitle">
        Ingresá los datos que te dio el proveedor. La instalación tarda
        10 a 15 minutos.
      </div>
      <form id="install-form">
        <div>
          <label for="branch">Sucursal</label>
          <input
            id="branch"
            name="branch"
            type="text"
            placeholder="ej. principal"
            autocomplete="off"
            required
          />
        </div>
        <div>
          <label for="apikey">Clave de la plataforma</label>
          <input
            id="apikey"
            name="apikey"
            type="password"
            placeholder="********"
            autocomplete="off"
            required
          />
        </div>
        <button type="submit" id="submit-btn">Instalar</button>
      </form>
      <div class="error" id="form-err"></div>
    </div>

    <div class="root hidden" id="progress-view">
      <div class="logo">O</div>
      <div class="title">Instalando OctoPOS</div>
      <div class="subtitle" id="subtitle">
        Esto puede tardar entre 5 y 15 minutos. No cierres esta ventana.
      </div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="fill"></div>
        </div>
        <div class="progress-text" id="msg">Iniciando...</div>
      </div>
      <div class="error" id="run-err"></div>
    </div>

    <script type="module">
      const { listen } = window.__TAURI__.event;
      const { invoke } = window.__TAURI__.core;

      const formView = document.getElementById("form-view");
      const progressView = document.getElementById("progress-view");
      const form = document.getElementById("install-form");
      const submitBtn = document.getElementById("submit-btn");
      const formErr = document.getElementById("form-err");
      const fill = document.getElementById("fill");
      const msg = document.getElementById("msg");
      const runErr = document.getElementById("run-err");

      listen("setup-progress", (event) => {
        const { percent, message } = event.payload;
        fill.style.width = `${Math.min(100, Math.max(0, percent))}%`;
        msg.textContent = message;
      });

      listen("setup-error", (event) => {
        runErr.textContent = event.payload.message ?? "Error desconocido.";
        runErr.classList.add("visible");
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const branch = document.getElementById("branch").value.trim();
        const apikey = document.getElementById("apikey").value.trim();
        if (!branch || !apikey) return;

        formErr.classList.remove("visible");
        submitBtn.disabled = true;
        submitBtn.textContent = "Validando...";

        try {
          await invoke("start_install", { branchSlug: branch, apiKey: apikey });
          formView.classList.add("hidden");
          progressView.classList.remove("hidden");
        } catch (err) {
          formErr.textContent = String(err);
          formErr.classList.add("visible");
          submitBtn.disabled = false;
          submitBtn.textContent = "Instalar";
        }
      });
    </script>
  </body>
</html>
