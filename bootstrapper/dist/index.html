<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OctoPOS Setup</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        color: #f8fafc;
        overflow: hidden;
      }
      .root {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px;
        gap: 16px;
        overflow: hidden;
      }
      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      .logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #10b981;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: -2px;
      }
      .title {
        font-size: 18px;
        font-weight: 600;
      }
      .subtitle {
        font-size: 13px;
        color: #94a3b8;
        text-align: center;
        max-width: 480px;
      }
      .progress-wrap {
        width: 100%;
        max-width: 480px;
        flex-shrink: 0;
      }
      .progress-bar {
        height: 6px;
        background: rgba(148, 163, 184, 0.2);
        border-radius: 999px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #10b981;
        width: 0%;
        transition: width 300ms ease;
        border-radius: 999px;
      }
      .progress-text {
        margin-top: 8px;
        font-size: 13px;
        color: #cbd5e1;
        text-align: center;
        min-height: 18px;
      }
      .log-pane {
        width: 100%;
        flex: 1;
        min-height: 120px;
        max-height: 100%;
        background: #020617;
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 8px;
        padding: 12px;
        font-family: "Consolas", "Cascadia Code", "Courier New", monospace;
        font-size: 11px;
        line-height: 1.5;
        color: #cbd5e1;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .log-pane .line { display: block; }
      .log-pane .stderr { color: #fca5a5; }
      .log-pane .meta { color: #64748b; }
      .error {
        padding: 10px 14px;
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.4);
        border-radius: 8px;
        color: #fca5a5;
        font-size: 13px;
        max-width: 600px;
        text-align: center;
        display: none;
        flex-shrink: 0;
      }
      .error.visible { display: block; }
    </style>
  </head>
  <body>
    <div class="root">
      <div class="header">
        <div class="logo">O</div>
        <div class="title">Instalando OctoPOS</div>
        <div class="subtitle">
          Esto puede tardar entre 5 y 15 minutos la primera vez.
          No cierres esta ventana — al terminar, el panel se abre solo.
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="fill"></div>
        </div>
        <div class="progress-text" id="msg">Iniciando...</div>
      </div>
      <div class="error" id="err"></div>
      <div class="log-pane" id="log"></div>
    </div>
    <script>
      // Plain script (not type="module") so it runs synchronously while
      // the body parses — by the time we reach this point the elements
      // referenced by id are already in the DOM. ES modules are defer
      // by default and run AFTER DOMContentLoaded, which made the old
      // listener-based init never fire. Stick to a vanilla script and
      // call invoke immediately; that pattern is what Tauri's own
      // examples use.
      const fill = document.getElementById("fill");
      const msg = document.getElementById("msg");
      const err = document.getElementById("err");
      const log = document.getElementById("log");

      const MAX_LOG_LINES = 1000;

      function showError(text) {
        err.textContent = text;
        err.classList.add("visible");
        msg.textContent = "";
      }

      function appendLog(stream, line) {
        const span = document.createElement("span");
        span.className = "line " + (stream === "stderr" ? "stderr" : "");
        span.textContent = line;
        log.appendChild(span);
        // Keep the rolling window tight — we don't want a 30-min
        // install with verbose docker pull output to balloon the DOM.
        while (log.childElementCount > MAX_LOG_LINES) {
          log.removeChild(log.firstChild);
        }
        // Auto-scroll only if the user hasn't scrolled up to read.
        const nearBottom =
          log.scrollHeight - log.scrollTop - log.clientHeight < 40;
        if (nearBottom) log.scrollTop = log.scrollHeight;
      }

      function appendMeta(line) {
        const span = document.createElement("span");
        span.className = "line meta";
        span.textContent = "[" + new Date().toLocaleTimeString() + "] " + line;
        log.appendChild(span);
        log.scrollTop = log.scrollHeight;
      }

      // window.__TAURI__ requires withGlobalTauri: true in
      // tauri.conf.json. Guard against the case where it isn't there
      // so we surface a real error instead of a frozen "Iniciando...".
      if (!window.__TAURI__) {
        showError(
          "El runtime de Tauri no esta disponible. Reinstala el bootstrapper.",
        );
      } else {
        const { listen } = window.__TAURI__.event;
        const { invoke } = window.__TAURI__.core;

        listen("setup-progress", (event) => {
          const { percent, message } = event.payload;
          fill.style.width = `${Math.min(100, Math.max(0, percent))}%`;
          msg.textContent = message;
          appendMeta(message);
        });

        listen("setup-log", (event) => {
          appendLog(event.payload.stream, event.payload.line);
        });

        listen("setup-error", (event) => {
          const m = event.payload.message ?? "Error desconocido.";
          showError(m);
          appendMeta("ERROR: " + m);
        });

        // Kick off the install pipeline immediately. Rust steps are
        // idempotent so re-runs (or runs on machines that already
        // have WSL/Docker) breeze through the early ones in seconds.
        invoke("start_install").catch((e) => {
          showError(String(e));
        });
      }
    </script>
  </body>
</html>
