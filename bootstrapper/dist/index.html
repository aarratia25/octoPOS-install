<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OctoPOS Setup</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        color: #f8fafc;
        overflow: hidden;
      }
      .root {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 32px;
        gap: 18px;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: #10b981;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: -1px;
      }
      .title {
        font-size: 20px;
        font-weight: 600;
      }
      .subtitle {
        font-size: 13px;
        color: #94a3b8;
        text-align: center;
        max-width: 360px;
      }
      form {
        width: 100%;
        max-width: 320px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 4px;
      }
      label {
        font-size: 12px;
        font-weight: 500;
        color: #cbd5e1;
        margin-bottom: 4px;
        display: block;
      }
      .hint {
        font-size: 11px;
        color: #64748b;
        margin-top: 4px;
        font-family: monospace;
        min-height: 14px;
      }
      .hint strong { color: #94a3b8; font-weight: 500; }
      input {
        width: 100%;
        padding: 9px 12px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 6px;
        color: #f8fafc;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        transition: border-color 150ms;
      }
      input:focus {
        border-color: #10b981;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #10b981;
        color: #0f172a;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        transition: background 150ms;
      }
      button:hover:not(:disabled) { background: #34d399; }
      button:disabled {
        background: #475569;
        color: #94a3b8;
        cursor: not-allowed;
      }
      .progress-wrap {
        width: 100%;
        max-width: 380px;
      }
      .progress-bar {
        height: 6px;
        background: rgba(148, 163, 184, 0.2);
        border-radius: 999px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #10b981;
        width: 0%;
        transition: width 300ms ease;
        border-radius: 999px;
      }
      .progress-text {
        margin-top: 10px;
        font-size: 12px;
        color: #cbd5e1;
        text-align: center;
        min-height: 16px;
      }
      .error {
        margin-top: 12px;
        padding: 10px 14px;
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.4);
        border-radius: 6px;
        color: #fca5a5;
        font-size: 12px;
        max-width: 320px;
        text-align: center;
        display: none;
      }
      .error.visible { display: block; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="root" id="form-view">
      <div class="logo">O</div>
      <div class="title">Instalar OctoPOS</div>
      <div class="subtitle">
        Ingresá los datos que te dio el proveedor. La instalación tarda
        10 a 15 minutos.
      </div>
      <form id="install-form" novalidate>
        <div>
          <label for="branch">Sucursal</label>
          <input
            id="branch"
            name="branch"
            type="text"
            placeholder="ej. San Bernardino"
            autocomplete="off"
          />
          <div class="hint" id="slug-hint"></div>
        </div>
        <div>
          <label for="apikey">Clave de la plataforma</label>
          <input
            id="apikey"
            name="apikey"
            type="password"
            placeholder="********"
            autocomplete="off"
          />
        </div>
        <button type="submit" id="submit-btn">Instalar</button>
      </form>
      <div class="error" id="form-err"></div>
    </div>

    <div class="root hidden" id="progress-view">
      <div class="logo">O</div>
      <div class="title">Instalando OctoPOS</div>
      <div class="subtitle" id="subtitle">
        Esto puede tardar entre 5 y 15 minutos. No cierres esta ventana.
      </div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="fill"></div>
        </div>
        <div class="progress-text" id="msg">Iniciando...</div>
      </div>
      <div class="error" id="run-err"></div>
    </div>

    <script type="module">
      // Tauri injects window.__TAURI__ at runtime inside the desktop
      // shell. When the file is opened in a plain browser (during UI
      // dev) we stub it so the form still works end-to-end and we
      // can iterate on layout / validations without rebuilding the
      // .exe each time. The stub also fires a fake progress timeline
      // so the bar + step text are testable in-browser.
      if (!window.__TAURI__) {
        const listeners = new Map();
        const noopUnlisten = () => {};
        const FAKE_TIMELINE = [
          [2, "Verificando requisitos del sistema..."],
          [8, "Descomprimiendo recursos..."],
          [15, "Verificando WSL2 y Ubuntu..."],
          [40, "Instalando Docker y dependencias..."],
          [70, "Levantando servicios (Mongo + API)..."],
          [80, "Servidor listo"],
          [85, "Instalando OctoPOS Admin..."],
          [92, "Registrando servicio de actualizaciones..."],
          [98, "Creando acceso directo..."],
          [100, "Listo. OctoPOS esta instalado."],
        ];
        window.__TAURI__ = {
          event: {
            listen: async (name, handler) => {
              listeners.set(name, handler);
              return noopUnlisten;
            },
          },
          core: {
            invoke: async (cmd, args) => {
              console.info("[stub] invoke()", cmd, args);
              if (cmd !== "start_install") return null;
              // Drive the fake timeline 800 ms apart so a tester
              // can watch the whole flow without waiting 15 minutes.
              const handler = listeners.get("setup-progress");
              if (handler) {
                FAKE_TIMELINE.forEach(([percent, message], idx) => {
                  setTimeout(() => {
                    handler({ payload: { percent, message } });
                  }, 800 * idx);
                });
              }
              return null;
            },
          },
        };
      }

      const { listen } = window.__TAURI__.event;
      const { invoke } = window.__TAURI__.core;

      const formView = document.getElementById("form-view");
      const progressView = document.getElementById("progress-view");
      const form = document.getElementById("install-form");
      const submitBtn = document.getElementById("submit-btn");
      const formErr = document.getElementById("form-err");
      const branchInput = document.getElementById("branch");
      const apikeyInput = document.getElementById("apikey");
      const slugHint = document.getElementById("slug-hint");
      const fill = document.getElementById("fill");
      const msg = document.getElementById("msg");
      const runErr = document.getElementById("run-err");

      // Strip diacritics, lowercase, replace any run of non-alphanumeric
      // chars with a single hyphen, trim hyphens off the ends. Keeps
      // only ASCII a-z 0-9 and -, which is the slug shape the
      // platform expects (matches the ConvertTo-Slug helper from the
      // legacy install.ps1).
      // Combining diacritics. Built via constructor so the source
      // file stays plain ASCII — embedding the literal range
      // characters caused the script to fail to parse on some
      // browsers and silently fall back to native form submit, which
      // wiped both inputs on click.
      const DIACRITIC_RE = new RegExp("[\\u0300-\\u036f]", "g");
      function toSlug(value) {
        return value
          .normalize("NFD")
          .replace(DIACRITIC_RE, "")
          .toLowerCase()
          .trim()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      // The platform issues keys in exactly this shape:
      //   AAAA-BBBB-CCCC-DDDD  (uppercase hex, dashes mandatory)
      // Anything else is rejected — the platform stores the literal
      // string and looks it up exact-match, so accepting a relaxed
      // form here would only let the technician submit something the
      // backend immediately fails to find.
      const KEY_RE = /^[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}$/;

      function showFormError(message) {
        formErr.textContent = message;
        formErr.classList.add("visible");
      }

      function clearFormError() {
        formErr.classList.remove("visible");
      }

      // Live slug preview so the technician sees what we'll send to
      // the platform.
      branchInput.addEventListener("input", () => {
        const slug = toSlug(branchInput.value);
        slugHint.innerHTML = slug
          ? `Identificador: <strong>${slug}</strong>`
          : "";
      });

      listen("setup-progress", (event) => {
        const { percent, message } = event.payload;
        fill.style.width = `${Math.min(100, Math.max(0, percent))}%`;
        msg.textContent = message;
      });

      listen("setup-error", (event) => {
        runErr.textContent = event.payload.message ?? "Error desconocido.";
        runErr.classList.add("visible");
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearFormError();

        const rawBranch = branchInput.value.trim();
        const apikey = apikeyInput.value.trim();

        if (!rawBranch) {
          showFormError("Ingresá el nombre de la sucursal.");
          branchInput.focus();
          return;
        }
        if (!apikey) {
          showFormError("Ingresá la clave de la plataforma.");
          apikeyInput.focus();
          return;
        }

        const slug = toSlug(rawBranch);
        if (!slug) {
          showFormError(
            "El nombre de la sucursal debe tener al menos una letra o número.",
          );
          branchInput.focus();
          return;
        }

        if (!KEY_RE.test(apikey)) {
          showFormError(
            "La clave debe tener el formato XXXX-XXXX-XXXX-XXXX en mayúsculas (ej. 5091-74D2-F1AE-909F).",
          );
          apikeyInput.focus();
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Validando...";

        try {
          await invoke("start_install", {
            branchSlug: slug,
            apiKey: apikey,
          });
          formView.classList.add("hidden");
          progressView.classList.remove("hidden");
        } catch (err) {
          formErr.textContent = String(err);
          formErr.classList.add("visible");
          submitBtn.disabled = false;
          submitBtn.textContent = "Instalar";
        }
      });
    </script>
  </body>
</html>
