# octoPOS-admin — per-store backing services.
#
# Runs on the store's central Windows machine inside WSL2. Spins up:
#   - mongodb  (local database)
#   - api      (NestJS, pulled as a pre-built image from our registry)
#
# The admin UI itself ships as a Tauri .msi installed on Windows; it
# connects to http://localhost:3000 served by the api container below.
# Updates flow through `docker compose pull api && docker compose up -d`
# triggered from the admin's Updates page.
#
# Usage:
#   docker compose up -d
services:
  mongodb:
    image: mongo:7
    container_name: octopos-mongodb
    restart: unless-stopped
    # autoheal label tells the autoheal sidecar (below) to kill this
    # container when Docker reports it as unhealthy. `restart:
    # unless-stopped` only acts on exits — for hangs that keep the
    # process alive but unresponsive, we need an external watcher.
    labels:
      - autoheal=true
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-octopos}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-ChangeMe}
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    # Mongo's official image ships `mongosh`; ping is the cheapest call
    # that proves both the daemon is up and the auth layer is loaded.
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # Pinned in .env (OCTOPOS_API_IMAGE, OCTOPOS_API_VERSION) so the
    # admin's Updates page can rewrite the version and trigger a pull
    # without touching this file.
    image: ${OCTOPOS_API_IMAGE:-ghcr.io/aarratia25/octopos-admin-api}:${OCTOPOS_API_VERSION:-latest}
    container_name: octopos-api
    restart: unless-stopped
    labels:
      - autoheal=true
    # `service_healthy` makes the API wait for Mongo's healthcheck instead
    # of just for its container to start. Without this the API can boot
    # against a Mongo that is still loading auth data and the very first
    # connection drops with `MongoServerSelectionError`.
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://${MONGO_USER:-octopos}:${MONGO_PASSWORD:-ChangeMe}@mongodb:27017/${MONGO_DB:-octopos}?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-604800}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:1430,http://localhost:1420,tauri://localhost,https://tauri.localhost,http://tauri.localhost}
      APP_VERSION: ${OCTOPOS_API_VERSION:-latest}
      OCTOPOS_KEY_PATH: /app/data/.encryption-key
      BACKUP_LOCAL_PATH: /app/backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_CRON_ENABLED: ${BACKUP_CRON_ENABLED:-true}
      MONGO_CONTAINER: octopos-mongodb
      MONGO_DB: ${MONGO_DB:-octopos}
      MONGO_USER: ${MONGO_USER:-octopos}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-ChangeMe}
      PLATFORM_URL: ${PLATFORM_URL:-}
    volumes:
      - api_uploads:/app/uploads
      - api_backups:/app/backups
      - api_data:/app/data
      # Mount the host Docker socket so the backup module can run
      # `docker exec octopos-mongodb mongodump` at runtime.
      - /var/run/docker.sock:/var/run/docker.sock
      # The updates module reads + rewrites the host's .env to pin the
      # next API tag, then runs `docker compose up -d --force-recreate`
      # against the same compose file. Bind-mount the install dir so
      # both files are reachable from inside the container. RW because
      # `.env` must be editable; the docker-compose.yml itself is
      # read-only by convention (we never rewrite it at runtime).
      - /opt/octopos:/host/opt/octopos
    ports:
      - "${API_PORT:-3000}:3000"
    # `wget` ships with node:22-alpine. The endpoint always returns 200
    # while the HTTP server is up — even if Mongo is down, the JSON body
    # carries `mongoUp:false` and Compose still considers the API
    # healthy. That's intentional: the API container is healthy as long
    # as it accepts requests; Mongo has its own healthcheck above.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # Autoheal sidecar — watches the Docker socket and kills any
  # container labelled `autoheal=true` that Docker reports as
  # `unhealthy`. Once the container exits, `restart: unless-stopped`
  # brings it back automatically. Without this, a process that hangs
  # (deadlock, stuck I/O, lazy GC) but does not crash stays
  # `unhealthy` forever and Docker Compose alone never reacts.
  # Tiny container (~5 MB RAM); the only privilege it needs is the
  # docker.sock read-write mount below.
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: octopos-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  mongo_data:
  api_uploads:
  api_backups:
  api_data:
